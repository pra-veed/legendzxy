<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!--
    Extractile - Premium Monochrome Favicon
    Specifically optimized for high visibility, legibility, and high-end aesthetic appeal
    on both dark and light browser tabs. Completely monochrome, avoiding any colors.
  -->
  <defs>
    <!-- Ultra-deep premium dark background gradient -->
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#14151a" />
      <stop offset="100%" stop-color="#08090b" />
    </radialGradient>

    <!-- Premium metallic silver gradient for the "E" emblem -->
    <linearGradient id="silverEmblem" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#e2e5e9" />
    </linearGradient>

    <!-- Subtle drop shadow to give the monogram depth -->
    <filter id="monogramShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#000000" flood-opacity="0.6" />
    </filter>
  </defs>

  <!-- 1. Deep Squircle Base Frame with high-contrast border -->
  <rect width="512" height="512" rx="156" fill="url(#bgGrad)" />
  <!-- High contrast outer bezel that ensures visibility on dark-themed browser tabs -->
  <rect x="8" y="8" width="496" height="496" rx="148" fill="none" stroke="#2d3139" stroke-width="16" />
  <!-- Inner crisp highlight ring -->
  <rect x="24" y="24" width="464" height="464" rx="132" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.1" />

  <!-- 2. "Extractile" Monogram Emblem (The Sleek "E" with Integrated Extraction Chevron) -->
  <g filter="url(#monogramShadow)" fill="url(#silverEmblem)">
    <!-- Vertical Backbone / Stem -->
    <rect x="136" y="130" width="64" height="252" rx="8" />

    <!-- Top Horizontal bar -->
    <rect x="200" y="130" width="176" height="60" rx="8" />

    <!-- Middle Extraction Chevron (The interactive center focal point) -->
    <path d="M 194,226 L 302,226 L 338,256 L 302,286 L 194,286 Z" />

    <!-- Bottom Horizontal bar -->
    <rect x="200" y="322" width="176" height="60" rx="8" />
  </g>

  <!-- 3. Minimal Precision Grid Accents (Highlights craftsmanship) -->
  <circle cx="256" cy="48" r="4" fill="#ffffff" opacity="0.3" />
  <circle cx="256" cy="464" r="4" fill="#ffffff" opacity="0.3" />
  <circle cx="48" cy="256" r="4" fill="#ffffff" opacity="0.3" />
  <circle cx="464" cy="256" r="4" fill="#ffffff" opacity="0.3" />
</svg>
